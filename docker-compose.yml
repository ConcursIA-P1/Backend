services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: concursia_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concursia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concursia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-concursia_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concursia} -d ${POSTGRES_DB:-concursia_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - concursia_network

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concursia_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-concursia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-concursia_dev}
      - POSTGRES_DB=${POSTGRES_DB:-concursia_db}
      - POSTGRES_PORT=5432
      - DEBUG=${DEBUG:-True}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./data:/app/data
      - ./scripts:/app/scripts
command: >
  sh -c "echo '🔄 Iniciando Setup Automático...' &&
        alembic upgrade head && 
        echo '1️⃣  Processando Dados Brutos...' &&
        python scripts/process_enem_questions.py && 
        echo '2️⃣  Classificando Questões...' &&
        python scripts/classify_questions.py && 
        echo '3️⃣  Populando Banco de Dados...' &&
        python scripts/seed_questions.py && 
        echo '✅ Setup Concluído! Iniciando Servidor...' &&
        uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - concursia_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  concursia_network:
    driver: bridge
