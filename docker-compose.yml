services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: concursia_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concursia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concursia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-concursia_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concursia} -d ${POSTGRES_DB:-concursia_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - concursia_network

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concursia_api
    ports:
      - "8000:8000"
    environment:
      # Aplicação
      - APP_NAME=${APP_NAME:-ConcursIA API}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - DEBUG=${DEBUG:-True}
      # Banco de dados PostgreSQL
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-concursia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-concursia_dev}
      - POSTGRES_DB=${POSTGRES_DB:-concursia_db}
      - POSTGRES_PORT=5432
      # APIs de LLM
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-pro}
      # ChromaDB
      - CHROMA_DB_PATH=${CHROMA_DB_PATH:-./chroma_db}
      - CHROMA_API_KEY=${CHROMA_API_KEY:-}
      - CHROMA_TENANT=${CHROMA_TENANT:-}
      - CHROMA_DATABASE=${CHROMA_DATABASE:-}
      - USE_CHROMA_CLOUD=${USE_CHROMA_CLOUD:-false}
      # RAG Configuration
      - RAG_COLLECTION_NAME=${RAG_COLLECTION_NAME:-concursia_documents}
      - RAG_TOP_K_RESULTS=${RAG_TOP_K_RESULTS:-3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-models/embedding-001}
      - COLLECTION_NAME=${COLLECTION_NAME:-concursia_documents}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-150}
      - MAX_DOCUMENTS=${MAX_DOCUMENTS:-5}
      - BATCH_SIZE=${BATCH_SIZE:-50}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - chroma_data:/app/chroma_db
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - concursia_network
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:

networks:
  concursia_network:
    driver: bridge
