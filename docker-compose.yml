services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: concursia_db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - concursia_network

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concursia_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override: dentro do Docker, o host do banco é o nome do serviço
      - POSTGRES_HOST=db
      # Desabilitar telemetria do ChromaDB
      - ANONYMIZED_TELEMETRY=False
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - chroma_data:/app/chroma_db
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - concursia_network
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:

networks:
  concursia_network:
    driver: bridge
